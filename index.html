<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMA Premium Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --accent: #00ff88;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0 0 80px 0; /* Pastki menyu uchun joy */
            user-select: none;
        }

        /* Profile Header */
        .profile-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); }
        .user-name { font-weight: 700; font-size: 16px; }
        
        .coin-balance {
            background: var(--surface);
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--glass);
        }

        /* Wallet Card */
        .wallet-card {
            margin: 0 15px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid var(--glass);
        }
        .wallet-amount { font-size: 24px; font-weight: 800; margin-bottom: 15px; }
        .wallet-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .action-btn {
            background: var(--glass);
            border: none;
            padding: 10px;
            border-radius: 12px;
            color: white;
            font-size: 10px;
            text-align: center;
        }
        .action-btn i { font-size: 18px; display: block; margin-bottom: 5px; color: var(--accent); }

        /* Banner Slider */
        .banner-container {
            margin: 20px 0;
            padding-left: 15px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
        }
        .banner {
            min-width: 85%;
            height: 120px;
            background: linear-gradient(90deg, #00ff8833, #000);
            border-radius: 20px;
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--accent);
            font-weight: bold;
        }

        /* Quick Filters */
        .filters {
            display: flex;
            gap: 8px;
            padding: 0 15px;
            margin-bottom: 20px;
        }
        .filter-btn {
            background: var(--surface);
            border: 1px solid var(--glass);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
        }
        .filter-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        /* Game Grid */
        .section-title { padding: 0 20px; font-size: 18px; font-weight: 700; margin-bottom: 15px; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            padding: 0 15px;
        }
        .game-card {
            background: var(--surface);
            border-radius: 18px;
            padding: 10px;
            text-align: center;
            position: relative;
            border: 1px solid var(--glass);
        }
        .game-card img { width: 100%; border-radius: 12px; margin-bottom: 8px; }
        .game-name { font-size: 12px; font-weight: 600; display: block; }
        .game-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--accent);
            color: #000;
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 900;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid var(--glass);
        }
        .nav-item { text-align: center; color: var(--text-secondary); font-size: 10px; text-decoration: none; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="user-info">
