<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMA Premium Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #000000; 
            --surface: #111111; 
            --accent: #00ff88; 
            --text-primary: #ffffff; 
            --text-secondary: #888888; 
            --glass: #222222; 
        }
        body { background-color: var(--bg); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; padding: 0 0 80px 0; user-select: none; }
        
        .profile-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-info img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        
        /* ⚡️ YANGI GEOMETRIK TOK SIMI (SEKINLASHTIRILGAN) */
        .line-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
            margin: 5px 0 15px 0;
            gap: 5px;
        }
        .triangle-left {
            width: 0; height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-right: 10px solid var(--accent);
        }
        .triangle-right {
            width: 0; height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 10px solid var(--accent);
        }
        .electric-line {
            height: 2px;
            flex-grow: 1;
            background: linear-gradient(90deg, #000, #00ff88, #ffffff, #00ff88, #000);
            background-size: 200% 100%;
            animation: spark 5s linear infinite; /* 5 soniya: juda sekin */
        }
        @keyframes spark {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .wallet-card { margin: 0 15px; background: #0a0a0a; padding: 20px; border-radius: 16px; border: 1px solid var(--glass); }
        .wallet-amount { font-size: 24px; font-weight: 800; color: #fff; }
        
        .section-title { padding: 0 20px; font-size: 14px; font-weight: 700; margin: 25px 0 15px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px; }
        .game-card { background: var(--surface); border-radius: 16px; padding: 15px 10px; text-align: center; border: 1px solid var(--glass); cursor: pointer; transition: 0.2s; }
        .game-card:active { transform: scale(0.95); border-color: var(--accent); }
        .game-card img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; }
        .game-name { font-size: 12px; font-weight: 600; display: block; }
        
        /* Modallar */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--glass); padding-bottom: 10px; }
        .modal-content { overflow-y: auto; flex-grow: 1; padding-bottom: 30px; }
        
        .price-item { background: var(--surface); margin-bottom: 10px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--glass); }
        .buy-btn { background: var(--accent); color: #000; padding: 8px 15px; border-radius: 8px; font-weight: bold; border: none; font-size: 12px; }
        
        /* Inputlar */
        .custom-input { width: 100%; background: var(--bg); border: 1px solid var(--glass); color: white; padding: 15px; border-radius: 10px; font-size: 14px; margin-bottom: 15px; box-sizing: border-box; }
        .custom-input:focus { border-color: var(--accent); outline: none; }

        .page { display: none; }
        .active-page { display: block; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #050505; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--glass); z-index: 500; }
        .nav-item { text-align: center; color: var(--text-secondary); font-size: 10px; cursor: pointer; flex-grow: 1; padding: 5px 0; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="home" class="page active-page">
        <div class="profile-header">
            <div class="user-info">
                <img id="profile-pic" src="https://i.ibb.co/6NGp879/default-avatar.png">
                <span class="user-name" id="display-name">Mijoz</span>
            </div>
        </div>
        
        <div class="line-wrapper">
            <div class="triangle-left"></div>
            <div class="electric-line"></div>
            <div class="triangle-right"></div>
        </div>

        <div class="wallet-card">
            <div class="wallet-amount">0 UZS</div>
            <div style="font-size: 12px; color: var(--text-secondary);">Mening balansingiz</div>
        </div>

        <div class="section-title">Katalog</div>
        <div class="grid">
            <div class="game-card" onclick="openModal('pubg')">
                <img src="https://upload.wikimedia.org/wikipedia/en/3/3b/Pubg_mobile_logo.png">
                <span class="game-name">PUBG Mobile</span>
            </div>
            <div class="game-card" onclick="openModal('ff')">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/5/52/Free_Fire_logo.svg/512px-Free_Fire_logo.svg.png">
                <span class="game-name">Free Fire</span>
            </div>
            <div class="game-card" onclick="openModal('mlbb')">
                <img src="https://upload.wikimedia.org/wikipedia/en/2/23/Mobile_Legends_Bang_Bang_logo.png">
                <span class="game-name">Mobile Legends</span>
            </div>
            <div class="game-card" onclick="openModal('phone')">
                <img src="https://cdn-icons-png.flaticon.com/512/3532/3532157.png" style="filter: grayscale(100%) brightness(200%);">
                <span class="game-name">Uyali Aloqa</span>
            </div>
        </div>
    </div>

    <div id="settings" class="page">
        <div class="line-wrapper">
            <div class="triangle-left"></div>
            <div class="electric-line"></div>
            <div class="triangle-right"></div>
        </div>
        <h2 class="section-title">Profil va Sozlamalar</h2>
        <div style="padding: 0 15px;">
            <div class="price-item" onclick="openEditProfile()">
                <span><i class="fas fa-user-edit"></i> Profilni tahrirlash</span><i class="fas fa-chevron-right"></i>
            </div>
            <div class="price-item" onclick="window.location.href='https://t.me/BMA_Owner'">
                <span><i class="fas fa-headset"></i> Admin bilan aloqa</span><i class="fas fa-external-link-alt"></i>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-header">
            <h3 id="modal-title">Narxlar</h3>
            <i class="fas fa-times" onclick="closeModal('modal')" style="font-size: 20px; color: var(--text-secondary);"></i>
        </div>
        <div id="modal-content" class="modal-content"></div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-header">
            <h3>Profilni tahrirlash</h3>
            <i class="fas fa-times" onclick="closeModal('edit-modal')" style="font-size: 20px; color: var(--text-secondary);"></i>
        </div>
        <div class="modal-content">
            <p style="color: var(--text-secondary); font-size: 12px;">Ismingizni kiriting:</p>
            <input type="text" id="edit-name" class="custom-input" placeholder="Yangi ism">
            
            <p style="color: var(--text-secondary); font-size: 12px;">Rasm havolasini (URL) kiriting:</p>
            <input type="text" id="edit-pic" class="custom-input" placeholder="https://rasm-linki.com/rasm.png">
            
            <button class="buy-btn" style="width: 100%; padding: 15px; font-size: 14px;" onclick="saveProfile()">Saqlash</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('home', this)"><i class="fas fa-store"></i>Do'kon</div>
        <div class="nav-item" onclick="nav('settings', this)"><i class="fas fa-user-cog"></i>Profil</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // 🛑 XATOLIKNI OLDINI OLISH UCHUN TRY...CATCH QO'SHILDI
        function loadProfile() {
            let savedName = null;
            let savedPic = null;
            
            try {
                savedName = localStorage.getItem('bma_name');
                savedPic = localStorage.getItem('bma_pic');
            } catch (error) {
                console.log("LocalStorage ruxsat etilmagan");
            }
            
            let tgName = tg.initDataUnsafe?.user?.first_name || "Mijoz";
            let tgPic = tg.initDataUnsafe?.user?.photo_url || "https://i.ibb.co/6NGp879/default-avatar.png";

            document.getElementById('display-name').innerText = savedName ? savedName : tgName;
            document.getElementById('profile-pic').src = savedPic ? savedPic : tgPic;
        }
        
        // Dastur ishga tushganda profilni yuklash
        loadProfile();

        function openEditProfile() { document.getElementById('edit-modal').style.display = 'flex'; }
        
        function saveProfile() {
            let n = document.getElementById('edit-name').value;
            let p = document.getElementById('edit-pic').value;
            
            try {
                if(n) localStorage.setItem('bma_name', n);
                if(p) localStorage.setItem('bma_pic', p);
                tg.showAlert("Profil muvaffaqiyatli yangilandi!");
            } catch (error) {
                tg.showAlert("Xatolik: Qurilmangiz xotiraga yozishga ruxsat bermayapti.");
            }
            
            loadProfile();
            closeModal('edit-modal');
        }

        const prices = {
            pubg: [ {n: "60 UC", p: "13.000"}, {n: "120 UC", p: "25.000"}, {n: "180 UC", p: "36.000"}, {n: "240 UC", p: "50.000"}, {n: "325 UC", p: "58.000"}, {n: "385 UC", p: "70.000"}, {n: "445 UC", p: "82.000"}, {n: "660 UC", p: "114.000"}, {n: "720 UC", p: "126.000"}, {n: "985 UC", p: "172.000"}, {n: "1320 UC", p: "228.000"}, {n: "1800 UC", p: "280.000"} ],
            ff: [ {n: "110💎", p: "19.000"}, {n: "231💎", p: "35.000"}, {n: "583💎", p: "74.000"}, {n: "1188💎", p: "147.000"}, {n: "2420💎", p: "274.000"}, {n: "Haftalik obuna", p: "37.000"}, {n: "Oylik obuna", p: "148.000"}, {n: "Booyah pass", p: "52.000"} ],
            mlbb: [ {n: "55💎 (50+5)", p: "10.500"}, {n: "86💎 (78+8)", p: "16.500"}, {n: "165💎", p: "31.400"}, {n: "Haftalik propusk", p: "19.800"}, {n: "Sumerechniy propusk", p: "107.000"} ]
        };

        function openModal(type) {
            let content = document.getElementById('modal-content');
            let title = document.getElementById('modal-title');
            content.innerHTML = "";
            document.getElementById('modal').style.display = 'flex';

            if(type === 'phone') {
                title.innerText = "UYALI ALOQA";
                content.innerHTML = `
                    <p style="color:var(--text-secondary); font-size:12px;">Qancha summa tashlamoqchisiz? (UZS)</p>
                    <input type="number" id="custom-sum" class="custom-input" placeholder="Masalan: 10000">
                    <button class="buy-btn" style="width:100%; padding:15px;" onclick="sendOrder('custom')">Tasdiqlash</button>
                `;
            } else {
                title.innerText = type.toUpperCase() + " NARXLARI";
                prices[type].forEach(item => {
                    content.innerHTML += `
                        <div class="price-item">
                            <span style="font-size: 14px;">${item.n} <br><b style="color:var(--accent);">${item.p} UZS
