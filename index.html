<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMA Premium Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #05070a; --card-bg: #11151c; --accent: #00ff88; 
            --purple: #5865f2; --text: #ffffff; --sub-text: #8b949e; 
            --border: rgba(255,255,255,0.05); --error: #ff4757; --success: #2ed573;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; }
        .page-content { padding-bottom: 90px; display: none; }
        .page-content.active { display: block; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-card img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--purple); }
        .balance-card { margin: 0 20px; background: #110e2b; padding: 20px; border-radius: 20px; border: 1px solid var(--purple); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .game-card { background: var(--card-bg); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid var(--border); }
        .game-card img { width: 60px; height: 60px; border-radius: 12px; }
        .main-btn { width: 100%; background: var(--purple); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; }
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0f131a; width: 100%; border-radius: 20px; padding: 20px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0b0e14; display: flex; padding: 15px 0; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; text-align: center; color: var(--sub-text); font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .history-item { background: var(--card-bg); margin: 10px 20px; padding: 12px; border-radius: 10px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>
    <div id="page-home" class="page-content active">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <img id="u-ava" src="https://ui-avatars.com/api/?name=U">
                <div>
                    <div id="u-name" style="font-weight:bold;">Yuklanmoqda...</div>
                    <div id="u-handle" style="font-size:10px; color:var(--accent);">@user</div>
                </div>
            </div>
            <div onclick="openModal('modal-topup')" style="color:var(--accent); font-size:14px;">+ To'ldirish</div>
        </div>

        <div class="balance-card">
            <div style="font-size:12px; opacity:0.6;">BALANS</div>
            <div style="font-size:28px; font-weight:900;"><span id="user-balance">0</span> UZS</div>
        </div>

        <div class="grid" id="game-grid">
            <div class="game-card" onclick="checkBuy('PUBG Mobile')"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A6R_N431Uf6W9v73MAn_1uT_Q6Wv53vU6A&s"><br>PUBG UC</div>
            <div class="game-card" onclick="checkBuy('Free Fire')"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6_L6q_fX1i4z4O4J-S8y0PZp5Y0f7v3vU6A&s"><br>FF Diamonds</div>
        </div>
    </div>

    <div id="page-history" class="page-content">
        <h3 style="padding:20px;">To'lovlar tarixi</h3>
        <div id="history-list"></div>
    </div>

    <div id="modal-topup" class="modal-bg">
        <div class="modal-content">
            <h3>Hisobni to'ldirish</h3>
            <input type="number" id="topup-amount" style="width:100%; padding:12px; margin-bottom:15px;" value="15000">
            <button class="main-btn" onclick="startPay()">To'lovga o'tish</button>
            <button onclick="closeModal('modal-topup')" style="background:none; border:none; color:white; width:100%; margin-top:10px;">Yopish</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('home', this)">Do'kon</div>
        <div class="nav-item" onclick="switchPage('history', this)">Tarix</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        
        let userBal = 0;
        // SERVER HAVOLASINI SHU YERGA YOZING:
        const API_BASE = "https://telegram-1-4tqg.onrender.com"; 

        function initUser() {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('u-name').innerText = user.first_name;
                document.getElementById('u-handle').innerText = user.username ? '@'+user.username : 'ID:'+user.id;
                if(user.photo_url) document.getElementById('u-ava').src = user.photo_url;
                
                // Balansni botdan olish
                fetch(`${API_BASE}/get-balance/${user.id}`)
                    .then(r => r.json())
                    .then(data => {
                        userBal = data.balance;
                        document.getElementById('user-balance').innerText = userBal.toLocaleString();
                        updateHistory(data.history);
                    });
            } else { setTimeout(initUser, 500); }
        }

        function startPay() {
            const amt = document.getElementById('topup-amount').value;
            const user = tg.initDataUnsafe?.user;
            if(!user) return;

            tg.sendData(JSON.stringify({ action: "pay_confirm", amount: amt, user_id: user.id }));
            tg.close();
        }

        function checkBuy(name) {
            tg.showAlert(userBal > 0 ? `${name} sotib olish uchun xizmatlar tez orada ishga tushadi!` : "Balans yetarli emas!");
        }

        function updateHistory(history) {
            const list = document.getElementById('history-list');
            list.innerHTML = history.length ? '' : '<p style="text-align:center; opacity:0.5;">Tarix bo\'sh</p>';
            history.reverse().forEach(h => {
                list.innerHTML += `<div class="history-item"><b>+${h.amount} UZS</b><br><small>${h.date}</small></div>`;
            });
        }

        function switchPage(p, el) {
            document.querySelectorAll('.page-content').forEach(pc => pc.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
            el.classList.add('active');
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        initUser();
    </script>
</body>
</html>
