<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMA Premium Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #000000; 
            --surface: #111111; 
            --accent: #00ff88; 
            --text-primary: #ffffff; 
            --text-secondary: #888888; 
            --glass: #222222; 
        }
        body { background-color: var(--bg); color: var(--text-primary); font-family: 'Inter', sans-serif; margin: 0; padding: 0 0 80px 0; user-select: none; }
        
        /* ELEKTR TOK ANIMATSIYASI */
        .electric-line {
            height: 2px;
            width: 100%;
            background: linear-gradient(90deg, #000, #00ff88, #fff, #00ff88, #000);
            background-size: 200% 100%;
            animation: spark 1.5s linear infinite;
        }
        @keyframes spark {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .profile-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-info img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        
        .wallet-card { margin: 10px 15px; background: #0a0a0a; padding: 20px; border-radius: 16px; border: 1px solid var(--glass); }
        .wallet-amount { font-size: 24px; font-weight: 800; color: #fff; }
        
        .section-title { padding: 0 20px; font-size: 16px; font-weight: 700; margin: 25px 0 15px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px; }
        .game-card { background: var(--surface); border-radius: 16px; padding: 15px 10px; text-align: center; border: 1px solid var(--glass); cursor: pointer; transition: 0.2s; }
        .game-card:active { transform: scale(0.95); border-color: var(--accent); }
        .game-card img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; }
        .game-name { font-size: 12px; font-weight: 600; display: block; }
        
        /* Modallar */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--glass); padding-bottom: 10px; }
        .modal-content { overflow-y: auto; flex-grow: 1; }
        
        .price-item { background: var(--surface); margin-bottom: 10px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--glass); }
        .buy-btn { background: var(--accent); color: #000; padding: 8px 15px; border-radius: 8px; font-weight: bold; border: none; font-size: 12px; }
        
        /* Inputlar (Profil va Aloqa uchun) */
        .custom-input { width: 100%; background: var(--bg); border: 1px solid var(--glass); color: white; padding: 15px; border-radius: 10px; font-size: 14px; margin-bottom: 15px; box-sizing: border-box; }
        .custom-input:focus { border-color: var(--accent); outline: none; }

        .page { display: none; }
        .active-page { display: block; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #050505; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--glass); }
        .nav-item { text-align: center; color: var(--text-secondary); font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="home" class="page active-page">
        <div class="profile-header">
            <div class="user-info">
                <img id="profile-pic" src="https://i.ibb.co/6NGp879/default-avatar.png">
                <span class="user-name" id="display-name">Mehmon</span>
            </div>
        </div>
        <div class="electric-line"></div> <div class="wallet-card">
            <div class="wallet-amount">0 UZS</div>
            <div style="font-size: 12px; color: var(--text-secondary);">Mening balansingiz</div>
        </div>

        <div class="section-title">Katalog</div>
        <div class="grid">
            <div class="game-card" onclick="openModal('pubg')">
                <img src="https://upload.wikimedia.org/wikipedia/en/3/3b/Pubg_mobile_logo.png">
                <span class="game-name">PUBG Mobile</span>
            </div>
            <div class="game-card" onclick="openModal('ff')">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/5/52/Free_Fire_logo.svg/512px-Free_Fire_logo.svg.png">
                <span class="game-name">Free Fire</span>
            </div>
            <div class="game-card" onclick="openModal('mlbb')">
                <img src="https://upload.wikimedia.org/wikipedia/en/2/23/Mobile_Legends_Bang_Bang_logo.png">
                <span class="game-name">Mobile Legends</span>
            </div>
            <div class="game-card" onclick="openModal('phone')">
                <img src="https://cdn-icons-png.flaticon.com/512/3532/3532157.png" style="filter: grayscale(100%) brightness(200%);">
                <span class="game-name">Uyali Aloqa</span>
            </div>
        </div>
    </div>

    <div id="settings" class="page">
        <div class="electric-line"></div>
        <h2 class="section-title">Profil va Sozlamalar</h2>
        <div style="padding: 0 15px;">
            <div class="price-item" onclick="openEditProfile()">
                <span><i class="fas fa-user-edit"></i> Profilni tahrirlash</span><i class="fas fa-chevron-right"></i>
            </div>
            <div class="price-item" onclick="window.location.href='https://t.me/BMA_Owner'">
                <span><i class="fas fa-headset"></i> Admin bilan aloqa</span><i class="fas fa-external-link-alt"></i>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-header">
            <h3 id="modal-title">Narxlar</h3>
            <i class="fas fa-times" onclick="closeModal('modal')" style="font-size: 20px; color: var(--text-secondary);"></i>
        </div>
        <div id="modal-content" class="modal-content"></div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-header">
            <h3>Profilni tahrirlash</h3>
            <i class="fas fa-times" onclick="closeModal('edit-modal')" style="font-size: 20px; color: var(--text-secondary);"></i>
        </div>
        <div class="modal-content">
            <p style="color: var(--text-secondary); font-size: 12px;">Ismingizni kiriting:</p>
            <input type="text" id="edit-name" class="custom-input" placeholder="Yangi ism">
            
            <p style="color: var(--text-secondary); font-size: 12px;">Rasm havolasini (URL) kiriting:</p>
            <input type="text" id="edit-pic" class="custom-input" placeholder="https://rasm-linki.com/rasm.png">
            
            <button class="buy-btn" style="width: 100%; padding: 15px; font-size: 14px;" onclick="saveProfile()">Saqlash</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('home')"><i class="fas fa-store"></i>Do'kon</div>
        <div class="nav-item" onclick="nav('settings')"><i class="fas fa-user-cog"></i>Profil</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // 1. PROFIL YUKLASH (LocalStorage orqali)
        function loadProfile() {
            let savedName = localStorage.getItem('bma_name');
            let savedPic = localStorage.getItem('bma_pic');
