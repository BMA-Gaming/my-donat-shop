<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMA Premium Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0b0e14; 
            --card-bg: #161b22; 
            --accent: #00ff88; 
            --purple: #5865f2;
            --text: #ffffff; 
            --sub-text: #8b949e; 
        }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0 0 90px 0; overflow-x: hidden; }

        /* --- 📐 GEOMETRIK ANIMATSIYA (YONDAGI SHAKLLAR) --- */
        .geo-shape { position: fixed; border: 2px solid rgba(0, 255, 136, 0.15); z-index: -1; pointer-events: none; animation: rotate 20s linear infinite; }
        .shape-l { top: 15%; left: -80px; width: 180px; height: 180px; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .shape-r { bottom: 20%; right: -80px; width: 160px; height: 160px; border-radius: 25px; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- ⚡️ ELEKTR TOK SIMI --- */
        .electric-flow { display: flex; align-items: center; padding: 10px 20px; gap: 8px; }
        .t-geom { width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; }
        .t-l { border-right: 12px solid var(--accent); }
        .t-r { border-left: 12px solid var(--accent); }
        .spark-line { height: 1px; flex: 1; background: linear-gradient(90deg, transparent, var(--accent), #fff, var(--accent), transparent); background-size: 200% 100%; animation: move 3s linear infinite; }
        @keyframes move { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* --- HEADER --- */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-card { display: flex; align-items: center; gap: 12px; }
        .user-card img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--purple); object-fit: cover; }
        .coin-box { background: var(--purple); padding: 6px 14px; border-radius: 12px; font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 6px; }

        /* --- BALANCE --- */
        .balance-section { margin: 0 20px; background: linear-gradient(135deg, #4e44ff, #2a1fd1); padding: 25px; border-radius: 22px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); position: relative; overflow: hidden; }
        .balance-num { font-size: 28px; font-weight: 900; display: block; }
        .balance-user { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 5px; display: block; }

        /* --- GRID --- */
        .label { padding: 25px 20px 12px; font-weight: 800; color: var(--sub-text); text-transform: uppercase; font-size: 12px; letter-spacing: 1.5px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px 5px; text-align: center; border: 1px solid rgba(255,255,255,0.03); transition: 0.2s; position: relative; }
        .card:active { transform: scale(0.95); background: #1c2128; }
        .card img { width: 50px; height: 50px; border-radius: 8px; margin-bottom: 8px; }
        .card span { display: block; font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .m-badge { position: absolute; top: 5px; right: 5px; background: orange; color: black; font-size: 7px; font-weight: 900; padding: 1px 4px; border-radius: 3px; }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .price-item { background: #1c2128; padding: 18px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-pay { background: var(--accent); color: #000; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 900; font-size: 12px; }
        
        /* Aloqa uchun maxsus input */
        .custom-input { width: 100%; background: #111; border: 1px solid var(--purple); color: white; padding: 18px; border-radius: 12px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }

        /* --- NAV --- */
        .navbar { position: fixed; bottom: 0; left: 0; right: 0; background: #0d1117; display: flex; padding: 15px 0; border-top: 1px solid #30363d; z-index: 1000; }
        .nav-tab { flex: 1; text-align: center; color: var(--sub-text); font-size: 10px; }
        .nav-tab.active { color: var(--purple); }
        .nav-tab i { display: block; font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="geo-shape shape-l"></div>
    <div class="geo-shape shape-r"></div>

    <div id="app-content">
        <div class="header">
            <div class="user-card">
                <img id="u-ava" src="https://ui-avatars.com/api/?name=B&background=random">
                <span id="u-name" style="font-weight: 700;">Aniqlanmoqda...</span>
            </div>
            <div class="coin-box"><i class="fas fa-coins" style="color: gold;"></i> <span id="u-coins">0</span></div>
        </div>

        <div class="electric-flow">
            <div class="t-geom t-l"></div>
            <div class="spark-line"></div>
            <div class="t-geom t-r"></div>
        </div>

        <div class="balance-section">
            <span class="balance-num">0 so'm</span>
            <span class="balance-user" id="u-handle">@loading...</span>
        </div>

        <div class="label">Mashhur o'yinlar</div>
        <div class="grid" id="game-grid">
            </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-header">
            <h2 id="m-title" style="margin:0">Narxlar</h2>
            <i class="fas fa-times-circle fa-2x" onclick="closeModal()"></i>
        </div>
        <div id="m-body" style="overflow-y: auto; flex: 1;"></div>
    </div>

    <nav class="navbar">
        <div class="nav-tab active"><i class="fas fa-home"></i>Asosiy</div>
        <div class="nav-tab" onclick="tg.showAlert('Yaqinda...')"><i class="fas fa-gem"></i>Gift arenda</div>
        <div class="nav-tab" onclick="tg.showAlert('Tarix bo\'sh')"><i class="fas fa-clock"></i>Tarix</div>
        <div class="nav-tab" onclick="tg.showAlert('Admin: @BMA_Owner')"><i class="fas fa-user-cog"></i>Sozlamalar</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Barcha o'yinlar va valyutalar
        const games = [
            { id: 'pubg', name: 'PUBG Mobile', img: 'https://www.pubgmobile.com/common/images/icon_logo.png', prices: ['60 UC - 12 000', '325 UC - 58 000', '660 UC - 115 000', '1320 UC - 230 000'] },
            { id: 'ff', name: 'Free Fire', img: 'https://dl.dir.freefiremobile.com/freefire/setup/ff_website/common/images/icon_logo.png', prices: ['110💎 - 19 000', '231💎 - 38 000', '583💎 - 75 000'] },
            { id: 'mlbb', name: 'Mobile Legends', img: 'https://m.mobilelegends.com/static/images/index/logo.png', prices: ['86💎 - 16 000', '172💎 - 32 000', '257💎 - 48 000'] },
            { id: 'genshin', name: 'Genshin Impact', img: 'https://genshin.hoyoverse.com/_nuxt/img/1598583.74313f8.png', prices: ['60 Crystals - 13 000', '300 Crystals - 60 000'] },
            { id: 'delta', name: 'Delta Force', img: 'https://img-os.hoyolab.com/community/20240524/1716535260844.png', prices: ['100 Points - 15 000', '500 Points - 70 000'] },
            { id: 'aloqa', name: 'Uyali Aloqa', img: 'https://cdn-icons-png.flaticon.com/512/3532/3532157.png', custom: true }
        ];

        function init() {
            // Profil aniqlash (Buypin uslubida)
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('u-name').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
                document.getElementById('u-handle').innerText = user.username ? "@" + user.username : "ID: " + user.id;
                if (user.photo_url) document.getElementById('u-ava').src = user.photo_url;
            } else {
                document.getElementById('u-name').innerText = "Baxtiyor Masharipov";
                document.getElementById('u-handle').innerText = "@Baxti_dev";
            }

            // Gridni to'ldirish
            const grid = document.getElementById('game-grid');
            grid.innerHTML = "";
            games.forEach(g => {
                grid.innerHTML += `
                    <div class="card" onclick="openGame('${g.id}')">
                        <div class="m-badge">Mashhur</div>
                        <img src="${g.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/588/588308.png'">
                        <span>${g.name}</span>
                    </div>
                `;
            });
        }

        function openGame(id) {
            const game = games.find(g => g.id === id);
            const body = document.getElementById('m-body');
            document.getElementById('m-title').innerText = game.name;
            body.innerHTML = "";

            if (game.custom) {
                // Aloqa uchun maxsus summa kiritish
                body.innerHTML = `
                    <p style="color:var(--sub-text)">To'lov qilmoqchi bo'lgan summani kiriting:</p>
                    <input type="number" id="c-sum" class="custom-input" placeholder="Summani yozing (masalan: 15000)">
                    <button class="btn-pay" style="width:100%; padding:20px" onclick="sendOrder('Aloqa: ' + document.getElementById('c-sum').value + ' so\'m')">SOTIB OLISH</button>
                `;
            } else {
                game.prices.forEach(p => {
                    body.innerHTML += `
                        <div class="price-item">
                            <span style="font-weight:700">${p.split(' - ')[0]}</span>
                            <span style="color:var(--accent)">${p.split(' - ')[1]} UZS</span>
                            <button class="btn-pay" onclick="sendOrder('${game.name}: ${p}')">SOTIB OLISH</button>
                        </div>
                    `;
                });
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function sendOrder(desc) {
            tg.sendData(JSON.stringify({ order: desc }));
            setTimeout(() => tg.close(), 100);
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        init();
    </script>
</body>
</html>
