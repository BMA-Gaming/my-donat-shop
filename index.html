<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMA Premium Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --card-bg: #121212;
            --accent: #00ff88; /* Neon Green */
            --text-main: #ffffff;
            --text-muted: #888888;
            --border: #1f1f1f;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            padding: 25px 0;
            text-align: center;
            background: linear-gradient(180deg, rgba(0,255,136,0.05) 0%, rgba(0,0,0,0) 100%);
            border-radius: 0 0 30px 30px;
        }

        .header h1 {
            font-size: 22px;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 800;
        }

        .header span { color: var(--accent); }

        /* Category Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            color: var(--text-muted);
        }

        .tab.active {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            border-color: var(--accent);
        }

        /* Grid System */
        .section-title {
            font-size: 14px;
            color: var(--text-muted);
            margin: 15px 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Premium Card Design */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            position: relative;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:active {
            transform: scale(0.95);
            border-color: var(--accent);
        }

        .card img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.2));
        }

        .item-name {
            font-size: 14px;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .price {
            color: var(--accent);
            font-size: 15px;
            font-weight: 800;
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent);
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 8px;
            font-weight: bold;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BMA <span>PREMIUM</span></h1>
    </div>

    <div class="tabs">
        <div class="tab active">Barchasi</div>
        <div class="tab">PUBG Mobile</div>
        <div class="tab">Free Fire</div>
        <div class="tab">Aloqa</div>
    </div>

    <div class="section-title"><i class="fas fa-gamepad"></i> O'yin valyutalari</div>
    <div class="grid">
        <div class="card" onclick="selectItem('PUBG 60 UC', 12000, 'game')">
            <div class="badge">TREND</div>
            <img src="https://i.ibb.co/L8f3yvB/pubg-uc.png" alt="UC">
            <span class="item-name">60 UC</span>
            <span class="price">12,000 so'm</span>
        </div>

        <div class="card" onclick="selectItem('PUBG 325 UC', 62000, 'game')">
            <img src="https://i.ibb.co/L8f3yvB/pubg-uc.png" alt="UC">
            <span class="item-name">325 UC</span>
            <span class="price">62,000 so'm</span>
        </div>

        <div class="card" onclick="selectItem('FF 110 Gems', 15000, 'game')">
            <img src="https://i.ibb.co/m0f6mXm/ff-diamond.png" alt="Diamond">
            <span class="item-name">110 Diamonds</span>
            <span class="price">15,000 so'm</span>
        </div>
    </div>

    <div class="section-title"><i class="fas fa-mobile-alt"></i> Mobil aloqa</div>
    <div class="grid">
        <div class="card" onclick="selectItem('Beeline 10,000', 10000, 'phone')">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/7/7a/Beeline.svg/1200px-Beeline.svg.png" alt="Beeline">
            <span class="item-name">Beeline</span>
            <span class="price">10,000 so'm</span>
        </div>
        <div class="card" onclick="selectItem('Ucell 10,000', 10000, 'phone')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Ucell_logo.svg/1024px-Ucell_logo.svg.png" alt="Ucell">
            <span class="item-name">Ucell</span>
            <span class="price">10,000 so'm</span>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let selected = null;

        function selectItem(name, price, type) {
            selected = { 
                item: name, 
                amount: price,
                category: type 
            };
            
            tg.MainButton.setText(`TASDIQLASH: ${price.toLocaleString()} UZS`);
            tg.MainButton.show();
            tg.MainButton.setParams({
                color: "#00ff88",
                text_color: "#000000"
            });
            
            // Haptic Feedback (Vibratsiya)
            tg.HapticFeedback.impactOccurred('medium');
        }

        tg.onEvent('mainButtonClicked', function() {
            tg.sendData(JSON.stringify(selected));
        });
    </script>
</body>
</html>
