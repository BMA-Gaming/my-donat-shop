<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMA Premium Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #05070a; --card-bg: #11151c; --accent: #00ff88; 
            --purple: #5865f2; --text: #ffffff; --sub-text: #8b949e; 
            --border: rgba(255,255,255,0.05); --error: #ff4757; --success: #2ed573;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .bg-particles { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 50% 0%, #151030 0%, var(--bg) 60%); }
        .page-content { padding-bottom: 90px; display: none; animation: fadeIn 0.3s ease-out; }
        .page-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-card { display: flex; align-items: center; gap: 12px; }
        .user-card img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--purple); object-fit: cover; }
        .username-badge { font-size: 11px; color: var(--accent); background: rgba(0, 255, 136, 0.1); padding: 2px 6px; border-radius: 4px; display: inline-block; }
        
        .balance-card { margin: 0 20px; background: linear-gradient(145deg, #1f1b4d, #110e2b); padding: 20px; border-radius: 20px; border: 1px solid rgba(88, 101, 242, 0.3); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .balance-amount { font-size: 28px; font-weight: 900; margin-top: 5px; }

        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 2000; display: none; align-items: flex-end; }
        .modal-content { background: #0f131a; width: 100%; max-height: 90vh; border-radius: 25px 25px 0 0; padding: 25px 20px; border-top: 1px solid var(--border); animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .timer-badge { background: rgba(255, 71, 87, 0.1); color: var(--error); padding: 5px 15px; border-radius: 20px; font-weight: bold; border: 1px solid var(--error); margin-bottom: 10px; display: inline-block; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px; }
        .game-card { background: var(--card-bg); border-radius: 16px; padding: 15px; text-align: center; border: 1px solid var(--border); transition: 0.2s; }
        .game-card img { width: 60px; height: 60px; border-radius: 12px; margin-bottom: 10px; object-fit: cover; }

        .history-item { background: var(--card-bg); margin: 10px 20px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); border-left: 4px solid var(--purple); }

        .main-btn { width: 100%; background: var(--purple); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .main-btn:disabled { opacity: 0.5; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(11, 14, 20, 0.98); display: flex; padding: 12px 0 25px; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; text-align: center; color: var(--sub-text); font-size: 11px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>
    <div class="bg-particles"></div>

    <div id="page-home" class="page-content active">
        <div class="header">
            <div class="user-card">
                <img id="u-ava" src="https://ui-avatars.com/api/?name=U&background=222&color=fff">
                <div>
                    <div id="u-name" style="font-weight: 800; font-size: 16px;">Yuklanmoqda...</div>
                    <div class="username-badge" id="u-handle">@username</div>
                </div>
            </div>
            <div onclick="openModal('modal-topup')" style="color: var(--accent); font-weight: 600; font-size: 14px; cursor: pointer;">
                <i class="fas fa-plus-circle"></i> To'ldirish
            </div>
        </div>

        <div class="balance-card">
            <div style="font-size: 12px; color: var(--sub-text); text-transform: uppercase;">Mening hisobim</div>
            <div class="balance-amount"><span id="user-balance">0</span> <span style="font-size: 16px; color: var(--accent);">UZS</span></div>
        </div>

        <h3 style="padding: 20px 20px 10px; margin: 0; font-size: 18px;">Katalog</h3>
        <div class="grid" id="game-grid"></div>
    </div>

    <div id="page-history" class="page-content">
        <h3 style="padding: 20px;">To'lovlar tarixi</h3>
        <div id="history-list">
            <p style="text-align:center; opacity:0.5; margin-top:50px;">Hozircha tarix bo'sh</p>
        </div>
    </div>

    <div id="modal-topup" class="modal-bg">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="font-size:18px; margin:0;">Hisobni to'ldirish</h2>
                <i class="fas fa-times" onclick="closeModal('modal-topup')" style="padding:10px;"></i>
            </div>
            <input type="number" id="topup-amount" style="width:100%; padding:15px; background:#0a0c10; border:1px solid var(--purple); color:white; border-radius:12px; margin-bottom:20px; font-size:16px;" value="15000">
            <button class="main-btn" onclick="startPaymentFlow()">To'lov qilish</button>
        </div>
    </div>

    <div id="modal-instruction" class="modal-bg">
        <div class="modal-content">
            <div style="text-align:center; margin-bottom:15px;">
                <div id="payment-timer" class="timer-badge">05:00</div>
                <h2 style="font-size:18px; margin:0;">To'lov yo'riqnomasi</h2>
            </div>
            
            <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; margin-bottom:15px; border:1px solid var(--border);">
                <div style="font-size:12px; opacity:0.8;">Karta raqami:</div>
                <div style="font-size:18px; font-weight:bold; letter-spacing:1px; margin:10px 0;" onclick="copyCard('8802502260365472')">
                    8802 5022 6036 5472 <i class="far fa-copy" style="font-size:14px; margin-left:10px;"></i>
                </div>
                <div style="font-size:13px;">To'lanadigan summa: <b id="display-sum" style="color:var(--accent);">0</b> <b>UZS</b></div>
            </div>

            <button id="pay-confirm-btn" class="main-btn" onclick="confirmPayment()">Pul to'ladim</button>
            <div id="wait-area" style="display:none; text-align:center; padding:15px;">
                <i class="fas fa-spinner fa-spin" style="color:var(--accent); font-size:24px; margin-bottom:10px;"></i>
                <p style="font-size:13px; color:var(--accent)">Admin tasdiqlashini kuting...</p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('home', this)"><i class="fas fa-th-large"></i><span>Do'kon</span></div>
        <div class="nav-item" onclick="switchPage('history', this)"><i class="fas fa-history"></i><span>Tarix</span></div>
        <div class="nav-item" onclick="tg.showAlert('Telegram: @BMA_Admin')"><i class="fas fa-headset"></i><span>Yordam</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // !!! MUHIM: RENDER HAVOLASINI SHU YERGA YOZ !!!
        const SERVER_URL = "https://SIZNING-LOYIHA-NOMINGIZ.render.com"; 

        let timeLeft = 300;
        let timerInterval;
        let currentAmount = 0;

        const catalog = [
            { id: 'pubg', name: 'PUBG Mobile UC', img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A6R_N431Uf6W9v73MAn_1uT_Q6Wv53vU6A&s' },
            { id: 'ff', name: 'Free Fire Diamonds', img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6_L6q_fX1i4z4O4J-S8y0PZp5Y0f7v3vU6A&s' },
            { id: 'ml', name: 'Mobile Legends', img: 'https://cdn-icons-png.flaticon.com/512/5260/5260498.png' },
            { id: 'tg_prem', name: 'TG Premium', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Telegram_logo.svg/2048px-Telegram_logo.svg.png' }
        ];

        // 1. Katalog va foydalanuvchini yuklash
        function initApp() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            catalog.forEach(item => {
                grid.innerHTML += `
                    <div class="game-card" onclick="tg.showAlert('Balans yetarli emas!')">
                        <img src="${item.img}">
                        <span>${item.name}</span>
                    </div>`;
            });
            loadUserData();
        }

        // 2. Serverdan balans va ma'lumotlarni olish
        function loadUserData() {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('u-name').innerText = user.first_name || 'Mijoz';
                document.getElementById('u-handle').innerText = user.username ? '@' + user.username : 'ID: ' + user.id;
                if (user.photo_url) document.getElementById('u-ava').src = user.photo_url;

                // Serverdan ma'lumotlarni tortish
                fetch(`${SERVER_URL}/get-balance/${user.id}`)
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById('user-balance').innerText = (data.balance || 0).toLocaleString();
                        
                        const historyList = document.getElementById('history-list');
                        if(data.history && data.history.length > 0) {
                            historyList.innerHTML = '';
                            data.history.reverse().forEach(item => {
                                historyList.innerHTML += `<div class="history-item"><b>+${item.amount} UZS</b><br><small>${item.date}</small></div>`;
                            });
                        }
                    })
                    .catch(e => console.error("Xato:", e));
            } else {
                setTimeout(loadUserData, 500);
            }
        }

        function switchPage(page, el) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            el.classList.add('active');
        }

        function startPaymentFlow() {
            const amt = document.getElementById('topup-amount').value;
            if (amt < 1000) return tg.showAlert("Minimal to'lov 1,000 UZS");
            currentAmount = amt;
            document.getElementById('display-sum').innerText = parseInt(amt).toLocaleString();
            closeModal('modal-topup');
            openModal('modal-instruction');
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 300;
            timerInterval = setInterval(() => {
                timeLeft--;
                let min = Math.floor(timeLeft / 60);
                let sec = timeLeft % 60;
                document.getElementById('payment-timer').innerText = `${min < 10 ? '0'+min : min}:${sec < 10 ? '0'+sec : sec}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    tg.showAlert("Vaqt tugadi!");
                    location.reload();
                }
            }, 1000);
        }

        function confirmPayment() {
            const user = tg.initDataUnsafe?.user;
            document.getElementById('pay-confirm-btn').style.display = 'none';
            document.getElementById('wait-area').style.display = 'block';

            const data = { action: "pay_confirm", amount: currentAmount, user_id: user?.id || 0 };
            tg.sendData(JSON.stringify(data));
            tg.HapticFeedback.notificationOccurred('success');
        }

        function copyCard(num) {
            navigator.clipboard.writeText(num);
            tg.HapticFeedback.impactOccurred('medium');
            tg.showAlert("Karta raqami nusxalandi!");
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { 
            document.getElementById(id).style.display = 'none'; 
            if(id === 'modal-instruction') clearInterval(timerInterval);
        }

        initApp();
    </script>
</body>
</html>
